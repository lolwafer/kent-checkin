<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Kent 前台打卡</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f4f6f4; color: #223; padding-bottom: 40px; }
  header { background: #2e7d32; color: #fff; padding: 14px 16px; text-align: center; }
  header h1 { font-size: 20px; }
  header .sub { font-size: 12px; opacity: .85; margin-top: 2px; }
  nav { display: flex; background: #fff; border-bottom: 1px solid #ddd; }
  nav button { flex: 1; padding: 12px; font-size: 17px; border: none; background: none; color: #667; border-bottom: 3px solid transparent; }
  nav button.on { color: #2e7d32; border-bottom-color: #2e7d32; font-weight: 600; }
  main { max-width: 560px; margin: 0 auto; padding: 14px; }
  .card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
  .card h2 { font-size: 15px; color: #556; margin-bottom: 10px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
  .grid button { padding: 16px 6px; font-size: 19px; border: 1px solid #cdd; border-radius: 10px; background: #fff; }
  .grid button.sel { background: #2e7d32; color: #fff; border-color: #2e7d32; }
  .bigbtn { display: block; width: 100%; padding: 18px; font-size: 22px; font-weight: 600; border: none; border-radius: 12px; color: #fff; margin-top: 12px; }
  .bigbtn.in { background: #2e7d32; }
  .bigbtn.out { background: #ef6c00; }
  .bigbtn:disabled { opacity: .55; }
  .msg { margin-top: 12px; padding: 12px; border-radius: 10px; font-size: 16px; display: none; }
  .msg.ok { background: #e6f4e6; color: #1b5e20; display: block; }
  .msg.err { background: #fdecea; color: #b71c1c; display: block; }
  .msg.wait { background: #fff8e1; color: #795500; display: block; }
  .status { font-size: 15px; color: #556; margin-top: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 15px; }
  th, td { padding: 8px 6px; border-bottom: 1px solid #eee; text-align: left; }
  th { color: #667; font-weight: 600; font-size: 13px; }
  td.num, th.num { text-align: right; }
  tr.click { cursor: pointer; }
  tr.click:active { background: #f0f4f0; }
  .flag { color: #c62828; font-size: 12px; }
  .today li { padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 15px; list-style: none; display: flex; justify-content: space-between; }
  .tag { font-size: 12px; padding: 2px 8px; border-radius: 10px; }
  .tag.in { background: #e6f4e6; color: #1b5e20; }
  .tag.out { background: #fff3e0; color: #ef6c00; }
  .row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
  input, select { padding: 10px; font-size: 16px; border: 1px solid #ccd; border-radius: 8px; background: #fff; }
  .btn { padding: 10px 14px; font-size: 15px; border: 1px solid #2e7d32; color: #2e7d32; background: #fff; border-radius: 8px; }
  .btn.solid { background: #2e7d32; color: #fff; }
  footer { text-align: center; font-size: 12px; color: #99a; margin-top: 20px; }
  .rpt-row { display: grid; grid-template-columns: 70px 60px 60px 60px 1fr; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
  .rpt-row.hd { font-weight: 600; color: #667; }
  .rpt-cell { text-align: center; }
  .rpt-cell.left { text-align: left; }
</style>
</head>
<body>
<header>
  <h1>Kent Senior Center 打卡</h1>
  <div class="sub">144-89 38th Ave, Flushing · 现场 150 米内打卡</div>
</header>
<nav>
  <button id="tabPunch" class="on">打卡</button>
  <button id="tabReport">报表</button>
</nav>

<main id="viewPunch">
  <div class="card">
    <h2>选择员工</h2>
    <div class="grid" id="empGrid"></div>
  </div>
  <div class="card" id="panel" style="display:none">
    <h2 id="panelTitle"></h2>
    <div class="status" id="panelStatus"></div>
    <button class="bigbtn in" id="punchBtn"></button>
    <div class="msg" id="msg"></div>
  </div>
  <div class="card">
    <h2>今日打卡</h2>
    <div id="todayList"></div>
  </div>
</main>

<main id="viewReport" style="display:none">
  <div class="card">
    <div class="row">
      <label style="font-size:15px">月份</label>
      <input type="month" id="monthPick">
    </div>
    <div id="reportTable" style="margin-top:12px"></div>
  </div>
</main>

<footer>Kent 打卡 v2026-07-16b · 由 Supabase 驱动</footer>

<script>
const CENTER = { lat: 40.7638555, lng: -73.8196091 };
const RADIUS = 150;
const SUPABASE_URL = 'https://objoggkkfqzzkfnitjlb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iam9nZ2trZnF6emtmbml0amxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNzQ5MjcsImV4cCI6MjA5OTc1MDkyN30.y_giQDWURvKJ_FgZTsBZru9NEs7QtDoBY2P_fl4M1vQ';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let selEmp = null;

const pad = n => String(n).padStart(2, '0');
const dstr = ts => { const d = new Date(ts); return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); };
const tstr = ts => { const d = new Date(ts); return pad(d.getHours()) + ':' + pad(d.getMinutes()); };

function hav(a, b) {
  const R = 6371000, r = x => x * Math.PI / 180;
  const dLat = r(b.lat - a.lat), dLng = r(b.lng - a.lng);
  const s = Math.sin(dLat/2)**2 + Math.cos(r(a.lat)) * Math.cos(r(b.lat)) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

async function loadEmps() {
  const { data, error } = await supabase.from('employees').select('*').order('id');
  if (error) { console.error(error); return; }
  const html = data.map(e => `<button class="${e.id===selEmp?'sel':''}" onclick="pick(${e.id})">${e.name}</button>`).join('');
  document.getElementById('empGrid').innerHTML = html;
}

window.pick = function(id) {
  selEmp = id; document.getElementById('msg').className = 'msg';
  loadEmps(); renderPanel();
};

async function renderPanel() {
  if (!selEmp) return;
  document.getElementById('panel').style.display = '';
  const { data: emp } = await supabase.from('employees').select('name').eq('id', selEmp).single();
  if (!emp) return;
  document.getElementById('panelTitle').textContent = emp.name + ' 打卡';

  const { data: today } = await supabase.from('punches')
    .select('type, created_at')
    .eq('employee_id', selEmp)
    .gte('created_at', new Date().toISOString().split('T')[0])
    .order('created_at');

  const last = today?.[today.length - 1];
  const goingIn = !last || last.type === 'out';
  const b = document.getElementById('punchBtn');
  b.textContent = goingIn ? '上班打卡 ▶' : '下班打卡 ■';
  b.className = 'bigbtn ' + (goingIn ? 'in' : 'out');
  b.disabled = false;
  document.getElementById('panelStatus').textContent = today?.length
    ? '今天已打:' + today.map(p => (p.type === 'in' ? '上班 ' : '下班 ') + tstr(new Date(p.created_at))).join(' · ')
    : '今天还没有打卡';
}

document.getElementById('punchBtn').onclick = () => {
  const goingIn = document.getElementById('punchBtn').classList.contains('in');
  const b = document.getElementById('punchBtn'), m = document.getElementById('msg');
  b.disabled = true;
  m.className = 'msg wait'; m.textContent = '正在定位,请稍候…';

  navigator.geolocation.getCurrentPosition(async pos => {
    const here = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    const dist = Math.round(hav(here, CENTER));
    if (dist > RADIUS) {
      m.className = 'msg err';
      m.textContent = '距离中心约 ' + (dist > 1000 ? (dist/1000).toFixed(1) + ' 公里' : dist + ' 米') + ',打卡失败(范围 ' + RADIUS + ' 米)。';
      renderPanel(); return;
    }

    const { error } = await supabase.from('punches').insert({
      employee_id: selEmp,
      type: goingIn ? 'in' : 'out',
      location_lat: here.lat,
      location_lng: here.lng,
      distance: dist
    });

    if (error) {
      m.className = 'msg err'; m.textContent = '保存失败:' + error.message;
      renderPanel(); return;
    }

    m.className = 'msg ok'; m.textContent = '✅ ' + (goingIn ? '上班' : '下班') + '打卡成功';
    renderPanel(); renderToday();
    supabase.channel('punches').on('postgres_changes', { event: '*', schema: 'public', table: 'punches' }, () => { renderToday(); }).subscribe();
  }, err => {
    m.className = 'msg err';
    m.textContent = err.code === 1 ? '定位权限被拒。请在浏览器设置允许定位。' : '定位失败,请重试。';
    renderPanel();
  }, { enableHighAccuracy: true, timeout: 20000 });
};

async function renderToday() {
  const t = dstr(Date.now());
  const { data: list } = await supabase.from('punches')
    .select('employee_id, type, created_at, employees(name)')
    .gte('created_at', new Date(t).toISOString())
    .lt('created_at', new Date(Date.parse(t) + 86400000).toISOString())
    .order('created_at', { ascending: false });

  document.getElementById('todayList').innerHTML = list?.length
    ? list.map(p => `<div style="padding:6px 0;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between">
        <span>${p.employees.name}</span>
        <span><span class="tag ${p.type}">${p.type==='in'?'上班':'下班'}</span> ${tstr(new Date(p.created_at))}</span></div>`).join('')
    : '<div style="color:#889">今天还没有人打卡</div>';
}

async function renderReport() {
  const ym = document.getElementById('monthPick').value;
  const start = ym + '-01', end = new Date(Date.parse(ym + '-01') + 86400000*32).toISOString().split('T')[0];

  const { data: all } = await supabase.from('punches')
    .select('employee_id, type, created_at, employees(name)')
    .gte('created_at', start)
    .lt('created_at', end)
    .order('created_at');

  if (!all?.length) { document.getElementById('reportTable').innerHTML = '<div style="color:#889">本月没有记录</div>'; return; }

  const byDay = {}, byPerson = {};
  all.forEach(p => {
    const d = dstr(new Date(p.created_at)), name = p.employees.name;
    if (!byDay[d]) byDay[d] = [];
    if (!byPerson[name]) byPerson[name] = { days: 0, hours: 0 };
    byDay[d].push(p);
  });

  Object.keys(byDay).sort().forEach(d => {
    const dayData = {};
    byDay[d].forEach(p => {
      const name = p.employees.name;
      if (!dayData[name]) dayData[name] = [];
      dayData[name].push(p);
    });
    Object.keys(dayData).forEach(name => {
      const evs = dayData[name].sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
      if (evs[0]?.type === 'in' && evs[1]?.type === 'out') {
        const hours = (new Date(evs[1].created_at) - new Date(evs[0].created_at)) / 3600000;
        byPerson[name].days++;
        byPerson[name].hours += hours;
      }
    });
  });

  let html = '<div class="rpt-row hd"><div>日期</div><div>员工</div><div>上班</div><div>下班</div><div>小时</div></div>';
  Object.keys(byDay).sort().forEach(d => {
    const dayData = {};
    byDay[d].forEach(p => {
      const name = p.employees.name;
      if (!dayData[name]) dayData[name] = [];
      dayData[name].push(p);
    });
    Object.keys(dayData).forEach(name => {
      const evs = dayData[name].sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
      const inT = evs[0] ? tstr(new Date(evs[0].created_at)) : '—';
      const outT = evs[1] ? tstr(new Date(evs[1].created_at)) : '—';
      const hours = evs[0]?.type === 'in' && evs[1]?.type === 'out'
        ? ((new Date(evs[1].created_at) - new Date(evs[0].created_at)) / 3600000).toFixed(2)
        : '缺卡';
      html += `<div class="rpt-row"><div class="rpt-cell left">${d.slice(5)}</div><div>${name}</div><div>${inT}</div><div>${outT}</div><div>${hours}</div></div>`;
    });
  });

  html += '<div class="rpt-row hd" style="margin-top:12px"><div>员工</div><div>出勤天</div><div>总小时</div></div>';
  Object.keys(byPerson).sort().forEach(name => {
    const v = byPerson[name];
    html += `<div class="rpt-row"><div class="rpt-cell left">${name}</div><div>${v.days}</div><div>${v.hours.toFixed(2)}</div></div>`;
  });

  document.getElementById('reportTable').innerHTML = html;
}

document.getElementById('tabPunch').onclick = () => {
  document.getElementById('tabPunch').className = 'on';
  document.getElementById('tabReport').className = '';
  document.getElementById('viewPunch').style.display = '';
  document.getElementById('viewReport').style.display = 'none';
};
document.getElementById('tabReport').onclick = () => {
  document.getElementById('tabReport').className = 'on';
  document.getElementById('tabPunch').className = '';
  document.getElementById('viewReport').style.display = '';
  document.getElementById('viewPunch').style.display = 'none';
  renderReport();
};

const now = new Date();
document.getElementById('monthPick').value = now.getFullYear() + '-' + pad(now.getMonth() + 1);
document.getElementById('monthPick').onchange = () => renderReport();

loadEmps(); renderToday();
supabase.channel('punches').on('postgres_changes', { event: '*', schema: 'public', table: 'punches' }, () => {
  loadEmps(); renderToday();
}).subscribe();
</script>
</body>
</html>
